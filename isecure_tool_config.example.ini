# iSecure Center local configuration (example)
# 该文件为示例配置，请勿填写真实 AK/SK 后直接提交

[settings]
# AK/SK 鉴权中的 AppKey
app_key =

# AK/SK 鉴权中的 AppSecret
app_secret =

# 请求协议: https 或 http
scheme = https

# HTTP 方法: GET/POST/PUT/DELETE
method = POST

# 平台地址与端口，例如 10.112.1.8:443
host = 127.0.0.1:443

# 接口 URL 路径，例如 /api/resource/v1/org/advance/orgList
api_path = /api/resource/v1/org/advance/orgList

# 是否自动补全 /artemis 前缀
auto_artemis = true

# 请求参数(JSON 字符串，换行会转义保存)
params_json = {\n  "pageNo": 1,\n  "pageSize": 100\n}

# 额外请求头(JSON 字符串，换行会转义保存)
headers_json = {}

# 自定义签名头列表，英文逗号分隔
sign_headers =

# Accept 请求头
accept = */*

# Content-Type 请求头
content_type = application/json

# 是否在签名中带 Date 头
use_date = false

# 是否校验证书
verify_ssl = false

# CA 证书文件路径
ca_bundle =

# 请求超时(秒)
timeout_sec = 20

# 是否将时间戳自动转 ISO8601
convert_time = true

# 是否在调试页显示签名字符串
show_signing = true

# 是否使用表单提交(body form)
body_form = false

# 发送前是否自动格式化请求参数 JSON
auto_pretty_params = true
